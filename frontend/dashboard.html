<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Usuario</title>
    <link href="assets/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body class="app-bg">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3 px-4 nav-glass">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
            <span class="brand-icon">📱</span>
            <span>Tienda de Celulares</span>
        </a>
        <div class="d-flex align-items-center gap-3">
            <span id="usuarioInfo" class="text-dark fw-semibold"></span>
            <button type="button" id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4">
            <aside class="col-lg-4">
                <div class="card shadow-sm p-4 bg-glass">
                    <h3 class="mb-3">Panel de Gestión</h3>
                    <p class="text-muted">Accede a tus productos publicados, ventas realizadas y compras.</p>
                    <div class="list-group">
                        <button id="btnProductos" class="list-group-item list-group-item-action active">Mis productos</button>
                        <button id="btnVentas" class="list-group-item list-group-item-action">Mis ventas</button>
                        <button id="btnCompras" class="list-group-item list-group-item-action">Mis compras</button>
                    </div>
                </div>
            </aside>

            <main class="col-lg-8">
                <div id="dashboardContent" class="card shadow-sm bg-glass p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h4 id="dashboardTitle">Mis productos</h4>
                            <p id="dashboardSubtitle" class="text-muted mb-0">Administra tus publicaciones activas.</p>
                        </div>
                        <a href="index.html" id="publishLink" class="btn btn-success">Publicar producto</a>
                    </div>

                    <div id="sectionProductos" class="dashboard-section"></div>
                    <div id="sectionVentas" class="dashboard-section d-none"></div>
                    <div id="sectionCompras" class="dashboard-section d-none"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="css/js/dashboard.js"></script>
</body>

</html>
