<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body class="auth-bg d-flex justify-content-center align-items-center vh-100">

    <div class="auth-card p-4 shadow">
        <div class="text-center mb-4">
            <div class="auth-badge">📝</div>
            <h2 class="fw-bold mt-3">Crear Cuenta</h2>
            <p class="text-muted mb-0">Regístrate para publicar y comprar celulares</p>
        </div>

        <form id="registerForm">

            <input
                type="text"
                id="nombre"
                class="form-control mb-3"
                placeholder="Nombre"
                required
            >

            <input
                type="text"
                id="apellido"
                class="form-control mb-3"
                placeholder="Apellido"
                required
            >

            <input
                type="email"
                id="correo"
                class="form-control mb-3"
                placeholder="Correo"
                required
            >

            <input
                type="password"
                id="contraseña"
                class="form-control mb-3"
                placeholder="Contraseña"
                required
            >

            <button class="btn btn-dark w-100">
                Registrarse
            </button>

        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="text-decoration-none text-white-50 link-underline">Ya tengo cuenta</a>
        </div>

    </div>

    <script src="css/js/register.js"></script>

</body>
</html>
