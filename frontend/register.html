<!DOCTYPE html>
<html lang="es">
<head>
    <link href="assets/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
</head>
<body class="auth-bg d-flex justify-content-center align-items-center vh-100">

    <div class="auth-card p-4 shadow">
        <div class="text-center mb-4">
            <div class="auth-badge">📝</div>
            <h2 class="fw-bold mt-3 animated-text">Crear Cuenta</h2>
            <p class="text-muted mb-0">Regístrate para publicar y comprar celulares</p>
        </div>

        <form id="registerForm" novalidate>
            <div id="registerError" class="alert alert-danger d-none" role="alert"></div>

            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre</label>
                <input
                    type="text"
                    id="nombre"
                    class="form-control"
                    placeholder="Ingresa tu nombre"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="apellido" class="form-label">Apellido</label>
                <input
                    type="text"
                    id="apellido"
                    class="form-control"
                    placeholder="Ingresa tu apellido"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input
                    type="email"
                    id="correo"
                    class="form-control"
                    placeholder="Ingresa tu correo electrónico"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="contraseña" class="form-label">Contraseña</label>
                <input
                    type="password"
                    id="contraseña"
                    class="form-control"
                    placeholder="Crea una contraseña"
                    required
                >
            </div>

            <button class="btn btn-dark w-100">
                Registrarse
            </button>

        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="text-decoration-none text-white-50 link-underline">Ya tengo cuenta</a>
        </div>

    </div>

    <!-- ========================= -->
    <!-- 🔔 NOTIFICACIÓN -->
    <!-- ========================= -->
    <div id="notification" class="notification alert alert-success alert-dismissible fade show d-none" role="alert">
        <span id="notificationMessage"></span>
        <button type="button" class="btn-close" onclick="hideNotification()"></button>
    </div>

    <script src="css/js/ui.js"></script>
    <script src="css/js/register.js"></script>

</body>
</html>
